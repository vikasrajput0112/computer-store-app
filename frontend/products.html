<!DOCTYPE html>
<html>
<head>
    <title>Products - Computer Store</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- HEADER -->
<header>
    <div class="logo">💻 Computer Store</div>
    <nav>
        <a href="index.html">Home</a>
        <a href="products.html">Products</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
    </nav>
</header>

<!-- PRODUCTS SECTION -->
<section class="products">
    <h1 id="page-title">Product Categories</h1>

    <div class="product-container" id="product-container">
        <!-- Dynamic content -->
    </div>
</section>

<!-- FOOTER -->
<footer>
    <p>© 2026 Computer Store | All Rights Reserved</p>
</footer>

<script>

// 🔹 Products
const products = [
    // RAM products
    { name: "DDR3 2GB RAM", category: "ram", type: "ddr3", size: "2GB", price: "₹800" },
    { name: "DDR3 4GB RAM", category: "ram", type: "ddr3", size: "4GB", price: "₹1200" },

    { name: "DDR4 8GB RAM", category: "ram", type: "ddr4", size: "8GB", price: "₹2500" },
    { name: "DDR4 16GB RAM", category: "ram", type: "ddr4", size: "16GB", price: "₹4500" },

    { name: "DDR5 8GB RAM", category: "ram", type: "ddr5", size: "8GB", price: "₹4000" },
    { name: "DDR5 16GB RAM", category: "ram", type: "ddr5", size: "16GB", price: "₹7000" },

    // Other products
    { name: "Logitech Gaming Mouse", category: "mouse", price: "₹799" },
    { name: "HP Gaming Mouse", category: "mouse", price: "₹699" }
];

// 🔹 Categories
const categories = [
    { name: "Mouse", key: "mouse" },
    { name: "RAM", key: "ram" },
    { name: "SSD", key: "ssd" },
    { name: "HDD", key: "hdd" },
    { name: "Processor", key: "cpu" }
];

// 🔹 RAM Types
const ramTypes = [
    { name: "DDR3", key: "ddr3" },
    { name: "DDR4", key: "ddr4" },
    { name: "DDR5", key: "ddr5" }
];

// 🔹 URL params
const params = new URLSearchParams(window.location.search);
const selectedCategory = params.get("category");
const selectedType = params.get("type");

const container = document.getElementById("product-container");
const title = document.getElementById("page-title");

// 🔥 STEP 1: Show categories
if (!selectedCategory) {

    title.innerText = "Product Categories";

    categories.forEach(cat => {
        const div = document.createElement("div");
        div.className = "card";
        div.style.cursor = "pointer";

        div.innerHTML = `<h3>${cat.name}</h3><p>View Products</p>`;

        div.onclick = () => {
            window.location.href = `products.html?category=${cat.key}`;
        };

        container.appendChild(div);
    });
}

// 🔥 STEP 2: If RAM selected → show RAM types
else if (selectedCategory === "ram" && !selectedType) {

    title.innerText = "Select RAM Type";

    ramTypes.forEach(type => {
        const div = document.createElement("div");
        div.className = "card";
        div.style.cursor = "pointer";

        div.innerHTML = `<h3>${type.name}</h3><p>Select</p>`;

        div.onclick = () => {
            window.location.href = `products.html?category=ram&type=${type.key}`;
        };

        container.appendChild(div);
    });
}

// 🔥 STEP 3: Show RAM products
else if (selectedCategory === "ram" && selectedType) {

    title.innerText = selectedType.toUpperCase() + " RAM";

    const filtered = products.filter(p =>
        p.category === "ram" && p.type === selectedType
    );

    filtered.forEach(product => {
        const div = document.createElement("div");
        div.className = "card";

        div.innerHTML = `
            <h3>${product.name}</h3>
            <p>${product.size}</p>
            <h4>${product.price}</h4>
            <button>Add to Cart</button>
        `;

        container.appendChild(div);
    });
}

// 🔥 STEP 4: Other categories (mouse etc.)
else {

    title.innerText = selectedCategory.toUpperCase() + " PRODUCTS";

    const filtered = products.filter(p => p.category === selectedCategory);

    filtered.forEach(product => {
        const div = document.createElement("div");
        div.className = "card";

        div.innerHTML = `
            <h3>${product.name}</h3>
            <h4>${product.price}</h4>
            <button>Add to Cart</button>
        `;

        container.appendChild(div);
    });
}

</script>

</body>
</html>
