<!DOCTYPE html>
<html>
<head>
    <title>Products - Computer Store</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- HEADER -->
<header>
    <div class="logo">💻 Computer Store</div>
    <nav>
        <a href="index.html">Home</a>
        <a href="products.html">Products</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
    </nav>
</header>

<!-- PRODUCTS SECTION -->
<section class="products">
    <h1>Our Products</h1>

    <div class="product-container" id="product-container">
        <!-- Products will be injected by JS -->
    </div>
</section>

<!-- FOOTER -->
<footer>
    <p>© 2026 Computer Store | All Rights Reserved</p>
</footer>

<!-- SCRIPT -->
<script>

const products = [
    // 🖱️ Mouse Category
    { name: "Logitech Gaming Mouse", category: "mouse", price: "₹799" },
    { name: "HP Gaming Mouse", category: "mouse", price: "₹699" },
    { name: "Dell Gaming Mouse", category: "mouse", price: "₹649" },
    { name: "Redgear Gaming Mouse", category: "mouse", price: "₹599" },

    // 💾 Other Products
    { name: "16GB RAM", category: "ram", price: "₹2999" },
    { name: "512GB SSD", category: "ssd", price: "₹3499" },
    { name: "1TB HDD", category: "hdd", price: "₹2500" },
    { name: "Intel i5 Processor", category: "cpu", price: "₹12000" }
];

// 👉 Get category from URL
const params = new URLSearchParams(window.location.search);
const selectedCategory = params.get("category");

// 👉 Filter products
const filteredProducts = selectedCategory
    ? products.filter(p => p.category === selectedCategory)
    : products;

// 👉 Render products
const container = document.getElementById("product-container");

filteredProducts.forEach(product => {
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
        <h3>${product.name}</h3>
        <p>${product.category.toUpperCase()}</p>
        <h4>${product.price}</h4>
        <button>Add to Cart</button>
    `;

    container.appendChild(div);
});

</script>

</body>
</html>
